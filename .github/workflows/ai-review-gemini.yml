# tf-workflows: Gemini AI Review (Reusable Workflow)
name: "AI Review - Gemini"

on:
  workflow_call:
    inputs:
      phase:
        description: "チェックリストフェーズ: 1 / 2 / 3"
        required: false
        default: "1"
        type: string
    secrets:
      GEMINI_API_KEY:
        required: true

permissions:
  contents: read
  pull-requests: write

jobs:
  gemini-review:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR diff
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr diff ${{ github.event.pull_request.number }} > pr_diff.txt

      - name: Checkout tf-workflows (prompts)
        uses: actions/checkout@v4
        with:
          repository: tf-nagai/tf-workflows
          path: tf-workflows
          sparse-checkout: prompts

      - name: Run Gemini Review
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          DIFF=$(cat pr_diff.txt)
          SYSTEM_PROMPT=$(cat tf-workflows/prompts/gemini-review-prompt.md)
          CHECKLIST=$(cat tf-workflows/prompts/checklist.md)

          # リクエストJSONをファイルに書き出し（シェル展開の問題を回避）
          jq -n \
            --arg prompt "$SYSTEM_PROMPT" \
            --arg checklist "$CHECKLIST" \
            --arg diff "$DIFF" \
            --arg phase "${{ inputs.phase }}" \
            '{
              system_instruction: { parts: [{ text: $prompt }] },
              contents: [{
                parts: [{
                  text: ("## チェックリスト（Phase " + $phase + "）\n\n" + $checklist + "\n\n## PR差分\n```diff\n" + $diff + "\n```\n\n上記の差分をセキュリティ・構造の観点でレビューしてください。")
                }]
              }],
              generationConfig: {
                maxOutputTokens: 4096,
                temperature: 0.2
              }
            }' > /tmp/gemini_request.json

          # Gemini API 呼び出し
          HTTP_CODE=$(curl -s -o /tmp/gemini_response.json -w "%{http_code}" \
            "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=$GEMINI_API_KEY" \
            -H "Content-Type: application/json" \
            -d @/tmp/gemini_request.json)

          echo "Gemini API HTTP status: $HTTP_CODE"

          if [ "$HTTP_CODE" != "200" ]; then
            echo "API Error Response:"
            cat /tmp/gemini_response.json
            echo "レビュー結果の取得に失敗しました（HTTP $HTTP_CODE）" > /tmp/review_body.md
          else
            jq -r '.candidates[0].content.parts[0].text // "レビュー結果の取得に失敗しました"' /tmp/gemini_response.json > /tmp/review_body.md
          fi

          if grep -q "🔴致命" /tmp/review_body.md; then
            echo "has_critical=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_critical=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Post review comment
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          {
            echo "## 🔍 Gemini AI Review (Phase ${{ inputs.phase }})"
            echo ""
            cat /tmp/review_body.md
            echo ""
            echo "---"
            echo "*Review by Gemini | Phase: ${{ inputs.phase }}*"
          } > /tmp/comment.md
          gh pr comment ${{ github.event.pull_request.number }} --body-file /tmp/comment.md

      - name: Block merge if critical
        if: steps.review.outputs.has_critical == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr edit ${{ github.event.pull_request.number }} --add-label "🔴 CRITICAL (Gemini)" || true
          echo "::error::Gemini が致命的な指摘を検出しました。"
          exit 1
