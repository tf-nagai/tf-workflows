# tf-workflows: Gemini AI Review (Reusable Workflow)
# セキュリティ・構造面のクロスレビュー
name: "AI Review - Gemini"

on:
  workflow_call:
    inputs:
      phase:
        description: "チェックリストフェーズ: 1 / 2 / 3"
        required: false
        default: "1"
        type: string
    secrets:
      GEMINI_API_KEY:
        required: true

permissions:
  contents: read
  pull-requests: write

jobs:
  gemini-review:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR diff
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr diff ${{ github.event.pull_request.number }} > pr_diff.txt

      - name: Checkout tf-workflows (prompts)
        uses: actions/checkout@v4
        with:
          repository: tf-nagai/tf-workflows
          path: tf-workflows
          sparse-checkout: prompts

      - name: Load prompts
        id: prompts
        run: |
          REVIEW_PROMPT=$(cat tf-workflows/prompts/gemini-review-prompt.md)
          CHECKLIST=$(cat tf-workflows/prompts/checklist.md)
          echo "review_prompt<<PROMPT_EOF" >> "$GITHUB_OUTPUT"
          echo "$REVIEW_PROMPT" >> "$GITHUB_OUTPUT"
          echo "PROMPT_EOF" >> "$GITHUB_OUTPUT"
          echo "checklist<<CHECKLIST_EOF" >> "$GITHUB_OUTPUT"
          echo "$CHECKLIST" >> "$GITHUB_OUTPUT"
          echo "CHECKLIST_EOF" >> "$GITHUB_OUTPUT"

      - name: Run Gemini Review
        id: review
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          DIFF=$(cat pr_diff.txt)
          PHASE="${{ inputs.phase }}"

          RESPONSE=$(curl -s \
            "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=$GEMINI_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg prompt "${{ steps.prompts.outputs.review_prompt }}" \
              --arg checklist "${{ steps.prompts.outputs.checklist }}" \
              --arg diff "$DIFF" \
              --arg phase "$PHASE" \
              '{
                system_instruction: { parts: [{ text: $prompt }] },
                contents: [{
                  parts: [{
                    text: "## チェックリスト（Phase \($phase)）\n\n\($checklist)\n\n## PR差分\n```diff\n\($diff)\n```\n\n上記の差分をセキュリティ・構造の観点でレビューしてください。"
                  }]
                }],
                generationConfig: {
                  maxOutputTokens: 4096,
                  temperature: 0.2
                }
              }'
            )")

          REVIEW_BODY=$(echo "$RESPONSE" | jq -r '.candidates[0].content.parts[0].text // "レビュー結果の取得に失敗しました"')

          echo "review_body<<REVIEW_EOF" >> "$GITHUB_OUTPUT"
          echo "$REVIEW_BODY" >> "$GITHUB_OUTPUT"
          echo "REVIEW_EOF" >> "$GITHUB_OUTPUT"

          if echo "$REVIEW_BODY" | grep -q "🔴致命"; then
            echo "has_critical=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_critical=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Post review comment
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          COMMENT_BODY="## 🔍 Gemini AI Review (Phase ${{ inputs.phase }})

          ${{ steps.review.outputs.review_body }}

          ---
          *Review by Gemini | Phase: ${{ inputs.phase }}*"

          gh pr comment ${{ github.event.pull_request.number }} \
            --body "$COMMENT_BODY"

      - name: Apply critical label if needed
        if: steps.review.outputs.has_critical == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr edit ${{ github.event.pull_request.number }} \
            --add-label "🔴 CRITICAL (Gemini)"
          echo "::error::Gemini が致命的な指摘を検出しました。"
          exit 1
